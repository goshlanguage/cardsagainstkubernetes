          - RBAC_CLUSTERROLE
          - RBAC_BINDING
          - RBAC_SA
          - RBAC_USER
          - RBAC_GROUP
          - RBAC_PSP
        correctAnswerId: rbac_role
      - prompt:
          text: Which workload object ensures that a copy of a Pod runs on all (or some) Nodes in the cluster?
