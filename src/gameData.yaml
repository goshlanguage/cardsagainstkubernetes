          - REPLICASET_UNIT
          - STATEFULSET
          - JOB_UNIT
          - CRONJOB_UNIT
          - POD_UNIT
        correctAnswerId: daemonset
      - prompt:
          text: What is the packaging format used by Helm?
        tag: cloud-native-application-delivery
        answers:
          - HELM_CHART
