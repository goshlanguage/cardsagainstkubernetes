          - HELM_REPO
          - HELM_TEMPLATE
          - HELM_VALUES
          - HELM_REVISION
          - HELM_HOOK
        correctAnswerId: helm_chart
      - prompt:
          text: Which controller automatically scales the number of Pods based on observed CPU utilization?
        tag: kubernetes-workloads
        answers:
